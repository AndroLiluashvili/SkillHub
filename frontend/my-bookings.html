<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="View and manage your SkillHub event bookings.">
  <title>SkillHub - My bookings</title>
  <script>
    (function () {
      var theme = localStorage.getItem("skillhub_theme");
      if (theme === "dark") document.documentElement.dataset.theme = "dark";
    })();
  </script>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css?v=skillhub-ux-5">
</head>
<body>
<a class="skip-link" href="#main-content">Skip to content</a>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">SkillHub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Events</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto" id="nav-auth"></ul>
    </div>
  </div>
</nav>

<main id="main-content" class="container main-shell">
  <section class="bookings-hero" aria-labelledby="bookings-heading">
    <div>
      <p class="eyebrow dark">Your schedule</p>
      <h1 id="bookings-heading">My bookings</h1>
      <p class="text-muted mb-0">Review your upcoming sessions and manage your plans.</p>
    </div>
    <a class="btn btn-primary" href="index.html#events-browse">Browse more events</a>
  </section>

  <div id="bookings-alert" class="alert alert-danger d-none" role="alert" tabindex="-1"></div>
  <div id="bookings-success" class="alert alert-success d-none" role="status" tabindex="-1"></div>
  <div id="bookings-loading" class="loading-message" role="status">Loading your bookings...</div>

  <section id="bookings-summary" class="bookings-summary d-none" aria-label="Bookings summary"></section>
  <div id="bookings-container" class="bookings-grid" aria-live="polite"></div>
</main>

<footer class="py-3 mt-auto">
  <div class="container text-center">
    <small>&copy; 2026 SkillHub. Web development and UX coursework project.</small>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=skillhub-ux-5"></script>
<script src="js/auth.js?v=skillhub-ux-5"></script>
<script src="js/bookings.js?v=skillhub-ux-5"></script>
</body>
</html>
